<style>
  :root{
    --bg: #14181a;
    --panel: #1c2224;
    --panel-2: #21282a;
    --line: #33403f;
    --accent: #e8a33d;
    --accent-dim: #7a5a26;
    --text: #eae6dd;
    --text-dim: #8b968f;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .app{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px 40px;
  }
  .header{
    width:100%;
    max-width:420px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .header .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.14em;
    color:var(--accent);
    text-transform:uppercase;
  }
  .header h1{
    font-family:var(--sans);
    font-size:19px;
    font-weight:700;
    margin:2px 0 0;
    letter-spacing:-.01em;
  }
  .stage{
    width:100%;
    max-width:420px;
    aspect-ratio: 3/4;
    background:#000;
    border-radius:10px;
    overflow:hidden;
    position:relative;
    border:1px solid var(--line);
  }
  video, canvas.shot{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  canvas.shot{ position:absolute; inset:0; display:none; }
  .reticle{
    position:absolute;
    inset:14%;
    pointer-events:none;
  }
  .reticle .corner{
    position:absolute;
    width:26px;
    height:26px;
    border:2.5px solid var(--accent);
    opacity:.9;
  }
  .reticle .tl{ top:0; left:0; border-right:none; border-bottom:none; }
  .reticle .tr{ top:0; right:0; border-left:none; border-bottom:none; }
  .reticle .bl{ bottom:0; left:0; border-right:none; border-top:none; }
  .reticle .br{ bottom:0; right:0; border-left:none; border-top:none; }
  .scanline{
    position:absolute;
    left:14%; right:14%;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow:0 0 8px var(--accent);
    animation:sweep 2.2s ease-in-out infinite;
    opacity:0;
  }
  .stage.scanning .scanline{ opacity:1; }
  @keyframes sweep{
    0%{ top:14%; }
    50%{ top:84%; }
    100%{ top:14%; }
  }
  .hint{
    position:absolute;
    bottom:10px; left:0; right:0;
    text-align:center;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:.04em;
  }
  .controls{
    width:100%;
    max-width:420px;
    display:flex;
    gap:10px;
    margin-top:14px;
  }
  button{
    font-family:var(--sans);
    font-weight:600;
    font-size:14.5px;
    border-radius:8px;
    border:1px solid var(--line);
    padding:13px 16px;
    cursor:pointer;
    transition:transform .08s ease, border-color .15s ease;
  }
  button:active{ transform:scale(.98); }
  .btn-primary{
    flex:1;
    background:var(--accent);
    color:#1a1300;
    border-color:var(--accent);
  }
  .btn-secondary{
    background:var(--panel);
    color:var(--text);
  }
  .btn-secondary:disabled, .btn-primary:disabled{
    opacity:.4; cursor:not-allowed;
  }
  .status{
    width:100%;
    max-width:420px;
    margin-top:14px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--accent);
    min-height:16px;
    letter-spacing:.03em;
  }
  .result{
    width:100%;
    max-width:420px;
    margin-top:6px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    display:none;
  }
  .result.show{ display:block; }
  .result .tag-strip{
    height:5px;
    background:repeating-linear-gradient(90deg, var(--accent) 0 10px, transparent 10px 16px);
    opacity:.7;
  }
  .field{
    padding:14px 16px;
    border-bottom:1px solid var(--line);
  }
  .field:last-child{ border-bottom:none; }
  .field .label{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.1em;
    margin-bottom:5px;
  }
  .field .value{
    font-family:var(--mono);
    font-size:16px;
    color:var(--text);
    word-break:break-word;
    line-height:1.4;
  }
  .field .value.empty{
    color:var(--text-dim);
    font-style:italic;
    font-size:13px;
  }
  .error-box{
    width:100%;
    max-width:420px;
    margin-top:14px;
    background:#2a1a16;
    border:1px solid #6b3a2a;
    color:#e8a99a;
    font-family:var(--mono);
    font-size:12.5px;
    padding:12px 14px;
    border-radius:8px;
    display:none;
  }
  .error-box.show{ display:block; }
</style>

<div class="app">
  <div class="header">
    <div>
      <div class="eyebrow">scanner de etiqueta</div>
      <h1>Leitor de Etiqueta</h1>
    </div>
  </div>

  <div class="stage" id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas class="shot" id="shotCanvas"></canvas>
    <div class="reticle">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <div class="scanline" id="scanline"></div>
    <div class="hint" id="hint">enquadre a etiqueta e capture</div>
  </div>

  <div class="controls">
    <button class="btn-secondary" id="retakeBtn" style="display:none;">Nova foto</button>
    <button class="btn-primary" id="captureBtn">Capturar etiqueta</button>
  </div>

  <div class="status" id="statusText"></div>
  <div class="error-box" id="errorBox"></div>

  <div class="result" id="result">
    <div class="tag-strip"></div>
    <div class="field">
      <div class="label">Nome / Identificação</div>
      <div class="value" id="valNome">—</div>
    </div>
    <div class="field">
      <div class="label">Número de série / lote / código</div>
      <div class="value" id="valCodigo">—</div>
    </div>
  </div>
</div>

<script>
(function(){
  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const shotCanvas = document.getElementById('shotCanvas');
  const captureBtn = document.getElementById('captureBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const statusText = document.getElementById('statusText');
  const errorBox = document.getElementById('errorBox');
  const hint = document.getElementById('hint');
  const result = document.getElementById('result');
  const valNome = document.getElementById('valNome');
  const valCodigo = document.getElementById('valCodigo');

  let stream = null;
  let captured = false;

  async function startCamera(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      });
      video.srcObject = stream;
    }catch(e){
      showError('Não consegui acessar a câmera. Verifique a permissão do navegador para câmera e recarregue a página.');
    }
  }

  function showError(msg){
    errorBox.textContent = msg;
    errorBox.classList.add('show');
  }
  function clearError(){
    errorBox.classList.remove('show');
    errorBox.textContent = '';
  }

  function setScanning(on){
    stage.classList.toggle('scanning', on);
  }

  captureBtn.addEventListener('click', async () => {
    clearError();
    if(!captured){
      // take the photo
      const w = video.videoWidth, h = video.videoHeight;
      shotCanvas.width = w; shotCanvas.height = h;
      const ctx = shotCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0, w, h);
      shotCanvas.style.display = 'block';
      video.style.display = 'none';
      captured = true;
      captureBtn.textContent = 'Analisando…';
      captureBtn.disabled = true;
      retakeBtn.style.display = 'none';
      hint.textContent = 'lendo os dados da etiqueta…';
      setScanning(true);
      result.classList.remove('show');

      try{
        const base64 = shotCanvas.toDataURL('image/jpeg', 0.92).split(',')[1];
        const data = await extractLabel(base64);
        valNome.textContent = data.nome && data.nome.trim() ? data.nome : '(não identificado)';
        valNome.classList.toggle('empty', !(data.nome && data.nome.trim()));
        valCodigo.textContent = data.codigo && data.codigo.trim() ? data.codigo : '(não identificado)';
        valCodigo.classList.toggle('empty', !(data.codigo && data.codigo.trim()));
        result.classList.add('show');
        hint.textContent = 'dados extraídos';
        statusText.textContent = '';
      }catch(e){
        showError('Não consegui extrair os dados dessa foto. Tente novamente com mais luz e a etiqueta bem enquadrada.');
        hint.textContent = 'enquadre a etiqueta e capture';
      }finally{
        setScanning(false);
        captureBtn.textContent = 'Capturar etiqueta';
        captureBtn.disabled = false;
        retakeBtn.style.display = 'block';
      }
    }
  });

  retakeBtn.addEventListener('click', () => {
    clearError();
    captured = false;
    shotCanvas.style.display = 'none';
    video.style.display = 'block';
    hint.textContent = 'enquadre a etiqueta e capture';
    result.classList.remove('show');
  });

  async function extractLabel(base64Image){
    const systemPrompt = `Você lê fotos de etiquetas (muitas vezes não padronizadas, de equipamentos, produtos ou peças) e extrai exatamente dois campos:
1. "nome": o nome ou identificação principal do item (o que a etiqueta identifica).
2. "codigo": qualquer número de série, lote, código de identificação ou referência impresso na etiqueta.

Responda APENAS com um objeto JSON válido, sem markdown, sem explicação, no formato exato:
{"nome": "...", "codigo": "..."}

Se um campo não estiver legível ou não existir na etiqueta, retorne string vazia para ele. Não invente informação que não esteja na imagem.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [
          {
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64Image } },
              { type: 'text', text: 'Extraia os dados dessa etiqueta seguindo exatamente o formato JSON pedido.' }
            ]
          }
        ]
      })
    });

    if(!response.ok){
      throw new Error('API error ' + response.status);
    }
    const json = await response.json();
    const textBlock = (json.content || []).find(b => b.type === 'text');
    if(!textBlock) throw new Error('Resposta sem texto');
    let clean = textBlock.text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    return JSON.parse(clean);
  }

  startCamera();
})();
</script>
